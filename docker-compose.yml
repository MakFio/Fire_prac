services:
  backend:
    build:
      context: .
      dockerfile: service/Dockerfile.backend
    container_name: fire_backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - backend_db:/app/db
    environment:
      - MODEL_PATH=/app/models/best_model/weights.pt
      - CONF_THRESHOLD=0.25
      - DB_PATH=/app/db/fire.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: service/Dockerfile.frontend
    container_name: fire_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_db: